<!DOCTYPE html>
<html>
    <head>
        <title>TaskFlow</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    </head>
    <body>

        <header>
            <h1>TaskFlow</h1>
        </header>

        <section id="search">
            <button id="button-add"><span class="plus">+</span>Task</button>
            <input type="text" placeholder="Search for Tasks" id="task-search">
            <div class="dropdown">
                <select name="filter" id="filter-task">
                    <option value="all">All</option>
                    <option value="completed">Completed</option>
                    <option value="pending">Pending</option>
                </select>
            </div>
        </section>

        <div class="empty-state">
        </div>

        <div class="overlay">
        <section class="add-task">
            <div class="add-task-interface">
                <input type="text" placeholder="Enter The Task" class="task-text" id="new-task">
                <div class="add-interface-button">
                    <button class="cancel-task-button" id="cancel-new-task">Cancel</button>
                    <button class="add-task-button" id="add-new-task">Add</button>
                </div>
            </div>
        </section>
        </div>

        <section class="display-tasks">
        </section>
        
        <script src="script.js"></script>
    </body>
</html>
